# Source: https://github.com/NVlabs/SegFormer
# Network: segformer_b3 (MiT-B3, NeurIPS 2021)
# Network: segformer_b3 分割网络
# SegFormer with MiT-B3 backbone: channels=[64, 128, 320, 512], layers=[3,4,18,3]

model:
  num_classes: 9
  img_size: 224
  architecture: segformer_b3
  encoder:
    in_channels: 3
  arch_params:
    backbone: mit_b3
data:
  type: synapse
  img_size: 224
  train_dir: ./data/Synapse/train_npz
  test_dir: ./data/Synapse/test_vol_h5
  train_list: ./data/Synapse/lists/lists_Synapse/train.txt
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06

evaluation:
  include_background: false  # set true to include background class in metrics
