# Source: https://github.com/Rahman-Motiur/MIST
# Network: mist (complete architecture)
# 完整网络：mist（完整架构）

model:
  num_classes: 9
  img_size: 256
  architecture: mist
  encoder:
    in_channels: 3
  arch_params:
    model_scale: small
    deep_supervision: true
data:
  type: synapse
  img_size: 256
  train_dir: ./data/Synapse/train_npz
  test_dir: ./data/Synapse/test_vol_h5
  train_list: ./data/Synapse/lists/lists_Synapse/train.txt
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  loss:
    name: deep_supervision
    params:
      base_loss:
        name: compound
        params:
          losses:
          - name: ce
            weight: 0.3
          - name: dice
            weight: 0.7
      aux_weight: 0.4
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06
