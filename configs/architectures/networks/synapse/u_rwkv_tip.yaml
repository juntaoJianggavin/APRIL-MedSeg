# Source: https://github.com/hbyecoding/U-RWKV (IEEE TIP 2026)
# Network: u_rwkv_tip (complete architecture, IEEE TIP 2026)
# 完整网络：U-RWKV TIP（完整架构，IEEE TIP 2026）

model:
  num_classes: 9
  img_size: 224
  architecture: u_rwkv_tip
  encoder:
    in_channels: 3
  arch_params:
    embed_dims:
    - 32
    - 64
    - 128
    - 256
    - 512
    rwkv_depths:
    - 1
    - 1
    - 1
    - 1
    - 2
    shift_pixel: 1
data:
  type: synapse
  img_size: 224
  train_dir: ./data/Synapse/train_npz
  test_dir: ./data/Synapse/test_vol_h5
  train_list: ./data/Synapse/lists/lists_Synapse/train.txt
  test_list: ./data/Synapse/lists/lists_Synapse/test_vol.txt
training:
  epochs: 200
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06
