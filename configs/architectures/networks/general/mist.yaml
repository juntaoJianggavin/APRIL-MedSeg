# Source: https://github.com/Rahman-Motiur/MIST
# Network: mist (complete architecture)
# 完整网络：mist（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: mist
  encoder:
    in_channels: 3
  arch_params:
    model_scale: small
    deep_supervision: true
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: deep_supervision
    params:
      base_loss:
        name: compound
        params:
          losses:
          - name: ce
            weight: 0.3
          - name: dice
            weight: 0.7
      aux_weight: 0.4
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0

evaluation:
  include_background: false  # set true to include background class in metrics
