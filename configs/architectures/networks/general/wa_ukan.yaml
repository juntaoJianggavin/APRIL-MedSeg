# Reference: Liu & Wang, "WA-UKAN: Wavelet-Enhanced Attention Kolmogorov-Arnold
#   Networks for medical image segmentation", Signal Processing: Image
#   Communication, 2026. DOI: 10.1016/j.image.2026.117534
# Network: wa_ukan (complete architecture)
# 完整网络：wa_ukan（完整架构）

model:
  num_classes: 2
  img_size: 256
  architecture: wa_ukan
  encoder:
    in_channels: 3
  arch_params: {}
data:
  type: generic
  img_size: 256
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test
training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0
