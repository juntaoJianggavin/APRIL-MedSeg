# Source: https://github.com/NVlabs/SegFormer
# Network: segformer_b4 (MiT-B4, NeurIPS 2021)
# Network: segformer_b4 分割网络
# SegFormer with MiT-B4 backbone: channels=[64, 128, 320, 512], layers=[3,8,27,3]

model:
  num_classes: 2
  img_size: 224
  architecture: segformer_b4
  encoder:
    in_channels: 3
  arch_params:
    backbone: mit_b4

data:
  type: generic
  img_size: 224
  train_dir: ./data/YourDataset/train
  val_dir: ./data/YourDataset/val
  test_dir: ./data/YourDataset/test

training:
  epochs: 300
  batch_size: 16
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 0

evaluation:
  include_background: false  # set true to include background class in metrics
