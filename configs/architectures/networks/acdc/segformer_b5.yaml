# Source: https://github.com/NVlabs/SegFormer
# Network: segformer_b5 (MiT-B5, NeurIPS 2021)
# Network: segformer_b5 分割网络
# SegFormer with MiT-B5 backbone: channels=[64, 128, 320, 512], layers=[3,8,27,3]

model:
  num_classes: 4
  img_size: 224
  architecture: segformer_b5
  encoder:
    in_channels: 3
  arch_params:
    backbone: mit_b5
data:
  type: acdc
  img_size: 224
  train_dir: ./data/ACDC/train_npz
  test_dir: ./data/ACDC/test_vol_h5
  train_list: ./data/ACDC/lists/train.txt
  test_list: ./data/ACDC/lists/test_vol.txt
training:
  epochs: 200
  batch_size: 8
  num_workers: 4
  loss:
    name: compound
    params:
      losses:
      - name: ce
        weight: 0.4
      - name: dice
        weight: 0.6
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.01
  scheduler:
    name: cosine
    min_lr: 1.0e-06

evaluation:
  include_background: false  # set true to include background class in metrics
