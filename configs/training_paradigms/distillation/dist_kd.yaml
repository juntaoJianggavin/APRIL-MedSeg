# DIST — Deep Instance-level Semantic Knowledge Transfer
# DIST —— 深度实例级语义知识迁移
#
# Reference: https://github.com/hunto/DIST_KD
# Paper: Huang et al., "Knowledge Distillation from A Stronger Teacher", NeurIPS 2022
#
# Usage:
#   python train_distillation.py \
#       --teacher_config configs/training_paradigms/distillation/teacher_large.yaml \
#       --student_config configs/training_paradigms/distillation/dist_kd.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: dist
  weight: 1.0
  params:
    beta: 1.0
    gamma: 1.0
    tau: 4.0

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001

evaluation:
  include_background: false  # set true to include background class in metrics
