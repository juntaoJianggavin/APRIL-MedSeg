# UNet Distillation — Hinton logit / feature / attention KD for segmentation
# UNet 蒸馏 —— 用于分割的 Hinton logit / 特征 / 注意力 KD
#
# Reference: https://github.com/peterliht/knowledge-distillation-pytorch
# Paper: Hinton et al., "Distilling the Knowledge in a Neural Network", NeurIPS WS 2014
#
# Usage:
#   python train_distillation.py \
#       --teacher_config configs/training_paradigms/distillation/teacher_large.yaml \
#       --student_config configs/training_paradigms/distillation/unet_distillation.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: unet_distillation
  weight: 1.0
  params:
    temperature: 4.0
    alpha: 0.5
    feature_weight: 0.5

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001

evaluation:
  include_background: false  # set true to include background class in metrics
