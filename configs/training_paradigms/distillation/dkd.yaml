# DKD — Decoupled Knowledge Distillation
# DKD —— 解耦知识蒸馏
#
# Reference: https://github.com/megvii-research/mdistiller
# Paper: Zhao et al., "Decoupled Knowledge Distillation", CVPR 2022
#
# Usage:
#   python train_distillation.py \
#       --teacher_config configs/training_paradigms/distillation/teacher_large.yaml \
#       --student_config configs/training_paradigms/distillation/dkd.yaml

model:
  num_classes: 4
  img_size: 224
  encoder:
    name: timm_resnet34
    pretrained: true
    in_channels: 3
    params: {}
  decoder:
    name: bilinear
    params: {}
  bottleneck:
    name: none

data:
  img_size: 224
  source:
    image_dir: ./data/source/images
    mask_dir: ./data/source/masks
  target:
    image_dir: ./data/target/images
  val:
    image_dir: ./data/target_val/images
    mask_dir: ./data/target_val/masks

distillation:
  method: dkd
  weight: 1.0
  params:
    alpha: 1.0
    beta: 8.0
    temperature: 4.0

training:
  epochs: 100
  batch_size: 8
  num_workers: 4
  val_interval: 10
  save_interval: 50
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: cosine
    min_lr: 0.000001

evaluation:
  include_background: false  # set true to include background class in metrics
